name: Release
run-name: ${{ github.workflow }} on ${{ github.ref_name }} by @${{ github.actor }}

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.1.0)'
        required: true

permissions:
  contents: write       # create the GitHub Release
  id-token: write       # for attestations
  attestations: write

jobs:
  build:
    name: build-${{ matrix.artifact }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-24.04, artifact: "linux-x86_64" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install prereqs
        run: |
          sudo apt update
          sudo apt install -y ninja-build pandoc
          git clone https://github.com/microsoft/vcpkg ${{ runner.temp }}/vcpkg
          ${{ runner.temp }}/vcpkg/bootstrap-vcpkg.sh
          echo "VCPKG_ROOT=${{ runner.temp }}/vcpkg" >> $GITHUB_ENV

      - name: Reproducible build env
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> $GITHUB_ENV

      - name: Configure (release)
        run: cmake --preset release

      - name: Build
        run: cmake --build --preset release --parallel

      - name: Stage artifact
        run: |
          stage="staging/abcpwn-${{ matrix.artifact }}"
          mkdir -p "$stage"
          cp build/release/abcpwn        "$stage/"
          cp LICENSE                     "$stage/"
          cp LICENSE-THIRD-PARTY.md      "$stage/"
          cp README.md                   "$stage/"
          cp CHANGELOG.md                "$stage/"
          cp BUILDING.md                 "$stage/"
          cp SECURITY.md                 "$stage/"
          if [ -f build/release/man/abcpwn.1 ]; then
            cp build/release/man/abcpwn.1 "$stage/"
          fi
          if [ -d completions ]; then
            cp -r completions             "$stage/"
          fi
          tar -C staging -czf abcpwn-${{ matrix.artifact }}.tar.gz \
              abcpwn-${{ matrix.artifact }}

      - name: Compute SHA-256
        run: sha256sum abcpwn-${{ matrix.artifact }}.tar.gz > SHA256SUMS-${{ matrix.artifact }}

      - name: Attest provenance
        # Repo is now public (since commit 620fb41) so the
        # actions/attest-build-provenance@v1 action is free and
        # functional - SLSA provenance lands in the release
        # attestations. continue-on-error stays as a safety belt
        # in case OIDC configuration needs tuning per-run; the
        # release flow no longer depends on attest succeeding,
        # but it should under normal conditions.
        continue-on-error: true
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: abcpwn-${{ matrix.artifact }}.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.artifact }}
          path: |
            abcpwn-${{ matrix.artifact }}.tar.gz
            SHA256SUMS-${{ matrix.artifact }}
          retention-days: 14

  release:
    name: publish
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Aggregate SHA256SUMS
        run: cat artifacts/SHA256SUMS-* > artifacts/SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/abcpwn-*.tar.gz
            artifacts/SHA256SUMS
          generate_release_notes: true
          # Draft mode for v0.1 so the maintainer can inspect the
          # archive shape (man page, completions, LICENSE-THIRD-PARTY
          # presence) before publishing. Promote to draft: false in a
          # v0.2 release-process commit once the pipeline is trusted.
          draft: true
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
