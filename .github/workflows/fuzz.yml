name: Fuzz
run-name: ${{ github.workflow }} on ${{ github.ref_name }} by @${{ github.actor }}

on:
  schedule:
    - cron: '0 2 * * *'  # Daily 02:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  fuzz:
    name: ${{ matrix.harness }}
    # Non-gating for v0.1.x: a fuzz crash uploads the artifact and
    # opens a tracking issue (see steps below) but does not fail the
    # workflow. Restored to gating in v0.2 once the initial backlog
    # of upstream-LIEF findings is triaged. See docs/ROADMAP.md.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - { harness: fuzz_binary_loader,   seeds: binary_loader }
          - { harness: fuzz_seccomp_decoder, seeds: seccomp_decoder }
          - { harness: fuzz_fmt_parser,      seeds: fmt_parser }
          - { harness: fuzz_gadget_filter,   seeds: gadget_filter }
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Restore fuzz corpus
        uses: actions/cache@v4
        with:
          path: tests/fuzz/corpus/${{ matrix.harness }}/
          key: fuzz-corpus-${{ matrix.harness }}-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-${{ matrix.harness }}-

      - name: Install prereqs
        run: |
          wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo gpg --dearmor -o /usr/share/keyrings/llvm.gpg
          codename=$(lsb_release -cs)
          echo "deb [signed-by=/usr/share/keyrings/llvm.gpg] https://apt.llvm.org/${codename}/ llvm-toolchain-${codename}-18 main" \
            | sudo tee /etc/apt/sources.list.d/llvm18.list
          sudo apt update
          sudo apt install -y ninja-build clang-18
          git clone https://github.com/microsoft/vcpkg ${{ runner.temp }}/vcpkg
          ${{ runner.temp }}/vcpkg/bootstrap-vcpkg.sh
          echo "VCPKG_ROOT=${{ runner.temp }}/vcpkg" >> $GITHUB_ENV

      - name: Build
        env:
          CC: clang-18
          CXX: clang++-18
        run: |
          cmake --preset fuzz
          cmake --build --preset fuzz --target ${{ matrix.harness }} --parallel

      - name: Run fuzzer (1 hour)
        run: |
          mkdir -p tests/fuzz/corpus/${{ matrix.harness }}
          ./build/fuzz/fuzz/${{ matrix.harness }} \
            -max_total_time=3600 \
            -print_final_stats=1 \
            tests/fuzz/corpus/${{ matrix.harness }} \
            tests/fuzz/seeds/${{ matrix.seeds }}

      - name: Upload crashes (on failure)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: fuzz-crashes-${{ matrix.harness }}-${{ github.run_id }}
          path: |
            crash-*
            leak-*
            oom-*
            timeout-*
          retention-days: 90

      - name: Open crash issue
        uses: actions/github-script@v7
        if: failure()
        with:
          script: |
            const harness = "${{ matrix.harness }}";
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `fuzz: crash in ${harness}`,
              body:  `Fuzzer ${harness} found a crash. See run: ${runUrl}\n\nCrash artifact uploaded.`,
              labels: ['security', 'fuzz', 'bug']
            });

      - name: Save corpus
        uses: actions/cache/save@v4
        if: always()
        with:
          path: tests/fuzz/corpus/${{ matrix.harness }}/
          key: fuzz-corpus-${{ matrix.harness }}-${{ github.run_id }}
