name: CodeQL
run-name: ${{ github.workflow }} on ${{ github.ref_name }} by @${{ github.actor }}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Monday 06:00 UTC

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: github/codeql-action/init@v3
        with:
          languages: cpp
          # security-extended only. The security-and-quality suite
          # added ~285 informational alerts on the first post-config
          # run (Catch2 macro FPs, vendored-dep style nits, conflicts
          # with the project's no-comments policy) and zero security
          # findings. abcpwn is a security tool; the quality suite's
          # signal-to-noise is too low to be worth the triage cost.
          queries: security-extended
          config-file: ./.github/codeql/codeql-config.yml

      - name: Install prereqs
        run: |
          sudo apt update
          sudo apt install -y ninja-build pandoc
          git clone https://github.com/microsoft/vcpkg ${{ runner.temp }}/vcpkg
          ${{ runner.temp }}/vcpkg/bootstrap-vcpkg.sh
          echo "VCPKG_ROOT=${{ runner.temp }}/vcpkg" >> $GITHUB_ENV

      - name: Build
        run: |
          cmake --preset release
          cmake --build --preset release --parallel

      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:cpp"
