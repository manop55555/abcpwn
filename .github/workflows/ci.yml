name: CI
run-name: ${{ github.workflow }} on ${{ github.ref_name }} by @${{ github.actor }}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  lint:
    name: lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Install lint tooling
        run: |
          # Add the official LLVM apt repo so we can install
          # clang-format-21 (matches the local maintainer
          # toolchain; v0.1 source is formatted to that version).
          wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo gpg --dearmor -o /usr/share/keyrings/llvm.gpg
          codename=$(lsb_release -cs)
          echo "deb [signed-by=/usr/share/keyrings/llvm.gpg] https://apt.llvm.org/${codename}/ llvm-toolchain-${codename}-21 main" \
            | sudo tee /etc/apt/sources.list.d/llvm21.list
          sudo apt update
          sudo apt install -y clang-format-21 clang-tidy-18 cppcheck
      - name: Install shellcheck (pinned, SHA-verified)
        run: |
          # apt's shellcheck drifts by distro (0.9.0 on Ubuntu vs 0.11.0
          # on Kali); pin the official static binary so local and CI run
          # the identical version. A version gap on one check (SC2002)
          # once let a finding pass local lint while failing CI.
          ver=0.11.0
          sha=8c3be12b05d5c177a04c29e3c78ce89ac86f1595681cab149b65b97c4e227198
          url="https://github.com/koalaman/shellcheck/releases/download/v${ver}/shellcheck-v${ver}.linux.x86_64.tar.xz"
          curl -sSL -o /tmp/shellcheck.tar.xz "$url"
          echo "${sha}  /tmp/shellcheck.tar.xz" | sha256sum -c -
          tar -xJf /tmp/shellcheck.tar.xz -C /tmp
          sudo install -m 755 "/tmp/shellcheck-v${ver}/shellcheck" /usr/local/bin/shellcheck
          shellcheck --version
      - name: Run orchestrator (check-all.sh runs all check-* gates incl shellcheck)
        run: scripts/check-all.sh
      - name: Run no-telemetry / urls / format
        run: |
          scripts/check-no-telemetry.sh
          scripts/check-urls.sh
          scripts/check-format.sh
      - name: shellcheck
        run: scripts/check-shellcheck.sh

  build:
    # Decoupled from lint (no needs:) so the build+test matrix always
    # runs and reports its own pass/fail. Previously `needs: lint` meant
    # a lint failure SKIPPED build+test entirely, which silently hid
    # whether the test suite passed. Both jobs are independent now and
    # both must be green for the run to pass.
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-24.04, cc: gcc-13,   cxx: g++-13,     apt_pkgs: "gcc-13 g++-13", name: "linux-x64-gcc"   }
          - { os: ubuntu-24.04, cc: clang-18, cxx: clang++-18, apt_pkgs: "clang-18",      name: "linux-x64-clang" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Add LLVM apt repo (clang-18)
        if: matrix.cc == 'clang-18'
        run: |
          wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo gpg --dearmor -o /usr/share/keyrings/llvm.gpg
          codename=$(lsb_release -cs)
          echo "deb [signed-by=/usr/share/keyrings/llvm.gpg] https://apt.llvm.org/${codename}/ llvm-toolchain-${codename}-18 main" \
            | sudo tee /etc/apt/sources.list.d/llvm18.list
          sudo apt update

      - name: Install prereqs
        run: |
          sudo apt update
          sudo apt install -y ninja-build cppcheck clang-tidy-18 pandoc ${{ matrix.apt_pkgs }}

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg ${{ runner.temp }}/vcpkg
          ${{ runner.temp }}/vcpkg/bootstrap-vcpkg.sh
          echo "VCPKG_ROOT=${{ runner.temp }}/vcpkg" >> $GITHUB_ENV

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: cmake --preset debug

      - name: Build
        run: cmake --build --preset debug --parallel

      - name: clang-tidy
        if: matrix.cc == 'clang-18'
        continue-on-error: true
        run: |
          find src include -name '*.cpp' -print0 \
            | xargs -0 clang-tidy-18 -p build/debug --quiet

      - name: cppcheck
        continue-on-error: true
        run: |
          cppcheck --enable=all --inconclusive --error-exitcode=1 \
                   --suppress=missingIncludeSystem \
                   --suppressions-list=.cppcheck-suppress \
                   -I include/ \
                   src/ 2>&1 | tail -50

      - name: Run tests
        run: ctest --preset debug --output-on-failure

      - name: Upload build on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-${{ matrix.name }}-${{ github.run_id }}
          path: build/debug/
          retention-days: 7
