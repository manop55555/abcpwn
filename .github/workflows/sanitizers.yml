name: Sanitizers

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sanitizers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sanitize:
    name: ${{ matrix.preset }}
    strategy:
      fail-fast: false
      matrix:
        preset: [asan, ubsan, tsan]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install prereqs
        run: |
          sudo apt update
          sudo apt install -y ninja-build clang-18
          git clone https://github.com/microsoft/vcpkg ${{ runner.temp }}/vcpkg
          ${{ runner.temp }}/vcpkg/bootstrap-vcpkg.sh
          echo "VCPKG_ROOT=${{ runner.temp }}/vcpkg" >> $GITHUB_ENV

      - name: Configure (${{ matrix.preset }})
        env:
          CC: clang-18
          CXX: clang++-18
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }} --parallel

      - name: Run tests
        env:
          ASAN_OPTIONS:  "detect_leaks=1:halt_on_error=1:abort_on_error=1"
          UBSAN_OPTIONS: "halt_on_error=1:print_stacktrace=1:abort_on_error=1"
          TSAN_OPTIONS:  "halt_on_error=1:second_deadlock_stack=1"
        run: ctest --test-dir build/${{ matrix.preset }} --output-on-failure
