name: abcpwn CodeQL config

# vcpkg-manifest projects materialize every dependency's headers
# under build/<preset>/vcpkg_installed/. CodeQL's default behavior
# is to analyze every file the build touches, which means vendored
# third-party code (LIEF, Capstone, nlohmann/json, spdlog, mbedtls)
# would generate findings the project cannot act on. tests/fixtures
# contains intentionally-malformed binaries used to drive parser
# tests; analyzing those serves no security purpose.
paths-ignore:
  - build/**
  - "**/vcpkg_installed/**"
  - tests/fixtures/**

# cpp/poorly-documented-function flags functions over a certain
# size with a comment-line ratio under 2 percent. The project policy
# (CLAUDE.md, "Default to writing no comments. Only add one when the
# WHY is non-obvious.") expressly avoids narrative comments, so the
# rule produces structural false positives on any sufficiently long
# action-dispatcher function. Exclude the rule project-wide rather
# than per-file.
query-filters:
  - exclude:
      id: cpp/poorly-documented-function
